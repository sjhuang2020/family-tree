<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>黄氏家谱</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <span class="site-title">黄氏家谱</span>
      <span class="site-subtitle">始祖 黄明璋 · 按出生次序传承</span>
      <nav class="site-nav">
        <a href="index.html">家谱树</a>
      </nav>
    </div>
  </header>

  <div class="wiki-container">
    <aside class="wiki-infobox">
      <div class="wiki-infobox-title">黄氏家族</div>
      <div class="wiki-infobox-body">
        <div class="wiki-infobox-row">
          <span class="wiki-infobox-label">始祖</span>
          <span class="wiki-infobox-value">黄明璋</span>
        </div>
        <div class="wiki-infobox-row">
          <span class="wiki-infobox-label">传承代数</span>
          <span class="wiki-infobox-value" id="stat-generations">—</span>
        </div>
        <div class="wiki-infobox-row">
          <span class="wiki-infobox-label">在册人数</span>
          <span class="wiki-infobox-value" id="stat-count">—</span>
        </div>
        <div class="wiki-infobox-row">
          <span class="wiki-infobox-label">排序方式</span>
          <span class="wiki-infobox-value">按出生次序</span>
        </div>
      </div>
    </aside>

    <main class="wiki-content">
      <h1 class="wiki-page-title">黄氏家谱（按出生次序）</h1>
      <p class="wiki-intro">
        黄氏家谱以黄明璋为始祖，按「长子 / 次子 / 长女 / 次女」等出生次序记录家族成员。
        点击节点查看人物详情；滚轮 / 双指缩放，拖拽平移，右下角按钮可放大、缩小、复位。
      </p>

      <section class="relation-judge">
        <div class="relation-judge-title">亲属关系自动判定</div>
        <div class="relation-judge-row">
          <span class="relation-judge-label">成员A</span>
          <select id="memberA" class="relation-judge-select"></select>
          <span class="relation-judge-label">相对于</span>
          <select id="memberB" class="relation-judge-select"></select>
          <button id="judgeBtn" class="relation-judge-btn">判定关系</button>
        </div>
        <div class="relation-judge-result" id="judgeResult">请选择两位家族成员，点击「判定关系」查看结果。</div>
      </section>

      <div class="tree-wrap">
        <div id="family-tree"></div>
        <div class="tree-hint">滚轮 / 双指缩放 · 拖拽平移</div>
        <div class="tree-controls">
          <button id="zoomIn" title="放大">+</button>
          <button id="zoomOut" title="缩小">−</button>
          <button id="zoomReset" title="复位" style="font-size:14px;">⤢</button>
        </div>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    黄氏家谱 · 静态家谱页面 · 数据维护于 family.json
  </footer>

  <script src="assets/genealogy.js"></script>
  <script>
    const { loadFamily, findMemberById, autoJudgeRelation } = window.Genealogy;

    loadFamily('family.json')
      .then(({ tree, members }) => {
        // ---- 侧栏统计 ----
        document.getElementById('stat-count').textContent = members.length + ' 人';
        const maxGen = Math.max(...members.map(m => m.generation));
        const cn = ['一','二','三','四','五','六','七','八','九','十'];
        document.getElementById('stat-generations').textContent =
          (cn[maxGen - 1] || maxGen) + ' 代';

        // ---- 关系判定下拉 ----
        const selA = document.getElementById('memberA');
        const selB = document.getElementById('memberB');
        members.forEach(m => {
          selA.add(new Option(m.name, m.id));
          selB.add(new Option(m.name, m.id));
        });
        if (members[1]) selB.value = members[0].id, selA.value = members[1].id;

        document.getElementById('judgeBtn').addEventListener('click', () => {
          const idA = selA.value, idB = selB.value;
          const result = document.getElementById('judgeResult');
          if (idA === idB) { result.textContent = '请选择两位不同的家族成员。'; return; }
          const rel = autoJudgeRelation(members, idA, idB);
          const aName = findMemberById(members, idA).name;
          const bName = findMemberById(members, idB).name;
          result.innerHTML = `${aName} 相对于 ${bName} 的关系是：<strong>${rel}</strong>`;
        });

        // ---- D3 树形图 ----
        renderTree(tree);
      })
      .catch(err => {
        console.error(err);
        document.getElementById('family-tree').innerHTML =
          '<div style="padding:24px;text-align:center;color:#b00;">家谱数据加载失败，请检查 family.json。</div>';
      });

    function renderTree(treeData) {
      const container = document.getElementById('family-tree');
      const NODE_W = 104, NODE_H = 56, GAP_X = 30, GAP_Y = 100;
      const PAD = 40; // 树内容四周留白

      const root = d3.hierarchy(treeData);
      const layout = d3.tree()
        .nodeSize([NODE_W + GAP_X, GAP_Y])
        .separation((a, b) => (a.parent === b.parent ? 1 : 1.25));
      layout(root);

      // 树内容包围盒
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      root.each(d => {
        minX = Math.min(minX, d.x);
        maxX = Math.max(maxX, d.x);
        minY = Math.min(minY, d.y);
        maxY = Math.max(maxY, d.y);
      });
      const contentW = (maxX - minX) + NODE_W + PAD * 2;
      const contentH = (maxY - minY) + NODE_H + PAD * 2;
      // 内容坐标 -> 画布坐标的平移量（让最左节点/最上节点落在 PAD 处）
      const shiftX = -minX + NODE_W / 2 + PAD;
      const shiftY = -minY + NODE_H / 2 + PAD;

      // SVG 铺满容器，内部用 g 承载 zoom 变换
      const svg = d3.select(container).append('svg')
        .attr('preserveAspectRatio', 'xMidYMid meet');
      const viewport = svg.append('g');        // 缩放/平移层
      const g = viewport.append('g')           // 内容层（固定偏移）
        .attr('transform', `translate(${shiftX}, ${shiftY})`);

      // 连线
      g.selectAll('.link')
        .data(root.links())
        .enter().append('path')
        .attr('class', 'link')
        .attr('d', d3.linkVertical().x(d => d.x).y(d => d.y));

      // 节点
      const node = g.selectAll('.node')
        .data(root.descendants())
        .enter().append('g')
        .attr('class', 'node')
        .attr('transform', d => `translate(${d.x}, ${d.y})`)
        .on('click', (event, d) => {
          window.location.href = `person.html?id=${d.data.id}`;
        });

      node.append('rect')
        .attr('class', d => 'node-card ' + (d.data.gender === '女' ? 'female' : 'male'))
        .attr('x', -NODE_W / 2).attr('y', -NODE_H / 2)
        .attr('width', NODE_W).attr('height', NODE_H)
        .attr('rx', 8);

      node.append('text')
        .attr('class', 'node-name')
        .attr('x', 0).attr('y', -8)
        .attr('text-anchor', 'middle')
        .text(d => d.data.name);

      node.append('text')
        .attr('class', 'node-relation')
        .attr('x', 0).attr('y', 12)
        .attr('text-anchor', 'middle')
        .text(d => d.data.relation ? d.data.relation : '');

      // ---- 缩放 / 拖拽（自动支持鼠标滚轮、触屏双指与拖动）----
      const zoom = d3.zoom()
        .scaleExtent([0.2, 2.5])
        .on('zoom', (event) => viewport.attr('transform', event.transform));
      svg.call(zoom);
      svg.on('dblclick.zoom', null); // 关掉双击放大，避免误触

      // 初始自动缩放：让整棵树一屏可见并居中
      function fitToScreen(animate) {
        const w = container.clientWidth || 800;
        const h = container.clientHeight || 600;
        const scale = Math.min(w / contentW, h / contentH, 1.3); // 上限 1.3 避免小树过大
        const tx = (w - contentW * scale) / 2;
        const ty = (h - contentH * scale) / 2;
        const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
        (animate ? svg.transition().duration(400) : svg).call(zoom.transform, t);
      }
      fitToScreen(false);

      // 控制按钮
      document.getElementById('zoomIn').onclick = () => svg.transition().duration(200).call(zoom.scaleBy, 1.3);
      document.getElementById('zoomOut').onclick = () => svg.transition().duration(200).call(zoom.scaleBy, 1 / 1.3);
      document.getElementById('zoomReset').onclick = () => fitToScreen(true);

      // 窗口尺寸变化时重新适配（含手机横竖屏切换）
      let rt;
      window.addEventListener('resize', () => {
        clearTimeout(rt);
        rt = setTimeout(() => fitToScreen(false), 200);
      });
    }
  </script>
</body>
</html>
